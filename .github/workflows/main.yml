on: push
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@4.3.3
      with:
        server: c1891779.ferozo.com/public_html/Backend
        username: ${{ secrets.ELTIOWISE_USER}}
        password: ${{ secrets.ELTIOWISE_PASS }}